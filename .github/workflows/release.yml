name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（例如 v1.0.3）'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      created: ${{ steps.release.outputs.created }}
    steps:
      - name: Create or update draft release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.inputs.version }}
        run: |
          ver="$(echo "$TAG_NAME" | sed 's/^v//')"
          cat > release-body.md << EOF
          建议下载安装版本 \`floral-notepaper_${ver}_x64-setup.exe\`，无法正常安装再下载可运行文件 \`floral-notepaper_${ver}.exe\`

          macOS 版安装流程请参考视频（Bilibili）：[Mac云课堂 - 在 Mac 上装软件，要学会和苹果斗智斗勇](https://www.bilibili.com/video/BV1tg411t7hN)
          EOF

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "created=false" >> "$GITHUB_OUTPUT"
            gh release edit "$TAG_NAME" --draft --notes-file release-body.md
          else
            echo "created=true" >> "$GITHUB_OUTPUT"
            gh release create "$TAG_NAME" --draft --title "$TAG_NAME" --notes-file release-body.md --target "$GITHUB_SHA"
          fi

  build-windows:
    needs: prepare-release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Set version
        shell: pwsh
        run: |
          $ver = "${{ github.event.inputs.version }}" -replace '^v', ''
          @'
          const fs = require("fs");
          const ver = process.argv[2];
          const conf = JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json", "utf8"));
          conf.version = ver;
          fs.writeFileSync("src-tauri/tauri.conf.json", JSON.stringify(conf, null, 2));
          let toml = fs.readFileSync("src-tauri/Cargo.toml", "utf8");
          toml = toml.replace(/^version = "[^"]*"/m, 'version = "' + ver + '"');
          fs.writeFileSync("src-tauri/Cargo.toml", toml);
          '@ | Out-File -Encoding utf8 set-version.cjs
          node set-version.cjs $ver

      - name: Build
        run: npm run tauri build

      - name: Rename portable binary
        shell: pwsh
        run: |
          $ver = "${{ github.event.inputs.version }}" -replace '^v', ''
          Copy-Item src-tauri/target/release/floral-notepaper.exe "floral-notepaper_$ver.exe"

      - name: Upload release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.inputs.version }}
        run: |
          $ver = "$TAG_NAME" -replace '^v', ''
          $files = @()
          $files += Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -File -Recurse | ForEach-Object { $_.FullName }
          $files += (Resolve-Path "floral-notepaper_$ver.exe").Path
          if ($files.Count -eq 0) {
            throw "No Windows release assets found."
          }
          gh release upload $TAG_NAME $files --clobber

  build-macos-x86_64:
    needs: prepare-release
    runs-on: macos-15-intel
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Install dependencies
        run: npm ci

      - name: Set version & disable signing
        run: |
          ver="$(echo '${{ github.event.inputs.version }}' | sed 's/^v//')"
          cat > set-version.cjs << 'SCRIPT'
          const fs = require("fs");
          const ver = process.argv[2];
          const conf = JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json", "utf8"));
          conf.version = ver;
          conf.bundle.macOS = conf.bundle.macOS || {};
          conf.bundle.macOS.signingIdentity = null;
          fs.writeFileSync("src-tauri/tauri.conf.json", JSON.stringify(conf, null, 2));
          let toml = fs.readFileSync("src-tauri/Cargo.toml", "utf8");
          toml = toml.replace(/^version = "[^"]*"/m, 'version = "' + ver + '"');
          fs.writeFileSync("src-tauri/Cargo.toml", toml);
          SCRIPT
          node set-version.cjs "$ver"

      - name: Build
        run: npm run tauri build -- --target x86_64-apple-darwin

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.inputs.version }}
        run: |
          files=()
          while IFS= read -r file; do
            files+=("$file")
          done < <(find src-tauri/target/x86_64-apple-darwin/release/bundle/dmg -type f)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No macOS x86_64 release assets found." >&2
            exit 1
          fi
          gh release upload "$TAG_NAME" "${files[@]}" --clobber

  build-macos-aarch64:
    needs: prepare-release
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install dependencies
        run: npm ci

      - name: Set version & disable signing
        run: |
          ver="$(echo '${{ github.event.inputs.version }}' | sed 's/^v//')"
          cat > set-version.cjs << 'SCRIPT'
          const fs = require("fs");
          const ver = process.argv[2];
          const conf = JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json", "utf8"));
          conf.version = ver;
          conf.bundle.macOS = conf.bundle.macOS || {};
          conf.bundle.macOS.signingIdentity = null;
          fs.writeFileSync("src-tauri/tauri.conf.json", JSON.stringify(conf, null, 2));
          let toml = fs.readFileSync("src-tauri/Cargo.toml", "utf8");
          toml = toml.replace(/^version = "[^"]*"/m, 'version = "' + ver + '"');
          fs.writeFileSync("src-tauri/Cargo.toml", toml);
          SCRIPT
          node set-version.cjs "$ver"

      - name: Build
        run: npm run tauri build -- --target aarch64-apple-darwin

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.inputs.version }}
        run: |
          files=()
          while IFS= read -r file; do
            files+=("$file")
          done < <(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -type f)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No macOS aarch64 release assets found." >&2
            exit 1
          fi
          gh release upload "$TAG_NAME" "${files[@]}" --clobber

  cleanup-release:
    needs: [prepare-release, build-windows, build-macos-x86_64, build-macos-aarch64]
    if: failure() && needs.prepare-release.outputs.created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete draft release after failed build
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.inputs.version }}
        run: |
          gh release delete "$TAG_NAME" --cleanup-tag --yes || true
